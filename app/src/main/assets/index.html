<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#121212;
    color:white;
    font-family:sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:400px;

    background:#1E1E1E;
    border-radius:20px;
    padding:20px;
}

.title{
    font-size:28px;
    font-weight:bold;
    margin-bottom:10px;
}

.version{
    color:#aaa;
    margin-bottom:20px;
}

button{
    width:100%;
    height:52px;

    border:none;
    border-radius:14px;

    font-size:16px;

    background:#4CAF50;
    color:white;
}
</style>
</head>

<body>

<div class="card">

    <div class="title">
        Macro App
    </div>

    <div class="version">
        Versão: <span id="version"></span>
    </div>

    <button onclick="Android.toast('Olá do HTML!')">
        Testar Java
    </button>

</div>

<script>
document.getElementById("version").innerText =
    Android.getVersion();
</script>

</body>
</html>
